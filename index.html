<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zeiterfassung – BIOS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    width: 100%;
    max-width: 520px;
    padding: 36px 32px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }

  .uhr {
    font-size: 52px;
    font-weight: 300;
    color: #1a1a1a;
    text-align: center;
    letter-spacing: -1px;
    margin: 12px 0 4px;
    font-variant-numeric: tabular-nums;
  }

  .datum {
    font-size: 15px;
    color: #888;
    text-align: center;
    margin-bottom: 28px;
  }

  /* Mitarbeiter Auswahl */
  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .mitarbeiter-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }

  .ma-btn {
    background: #f5f5f5;
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 10px 6px;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.3;
  }

  .ma-btn:hover { background: #e8e8e8; }

  .ma-btn.selected {
    background: #EEF2FF;
    border-color: #6366F1;
    color: #4338CA;
  }

  /* Aktions-Buttons */
  .aktionen {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .aktion-btn {
    padding: 20px;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    letter-spacing: -0.2px;
  }

  .aktion-btn:active { transform: scale(0.98); }

  .aktion-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }

  .btn-ein {
    background: #22C55E;
    color: #fff;
  }

  .btn-pause {
    background: #F59E0B;
    color: #fff;
  }

  .btn-aus {
    background: #EF4444;
    color: #fff;
  }

  /* Status-Anzeige */
  .status-bar {
    background: #f9f9f9;
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 14px;
    color: #555;
    min-height: 48px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-grau { background: #ccc; }
  .dot-gruen { background: #22C55E; }
  .dot-gelb { background: #F59E0B; }
  .dot-rot { background: #EF4444; }

  /* Log */
  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .log-clear {
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }

  .log-clear:hover { color: #EF4444; }

  .log {
    background: #f9f9f9;
    border-radius: 10px;
    padding: 12px;
    max-height: 140px;
    overflow-y: auto;
    font-size: 12px;
    font-family: 'SF Mono', 'Menlo', monospace;
    color: #666;
    line-height: 1.7;
  }

  .log-entry.success { color: #16A34A; }
  .log-entry.error { color: #DC2626; }
  .log-entry.info { color: #2563EB; }

  /* Config Hinweis */
  .config-hint {
    margin-top: 20px;
    background: #FFF7ED;
    border: 1px solid #FED7AA;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: #92400E;
    line-height: 1.6;
  }

  .config-hint strong { font-weight: 600; }

  /* Icon helper */
  .icon { font-size: 20px; }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid #f0f0f0;
    margin: 20px 0;
  }
</style>
</head>
<body>

<div class="card">
  <h1>⏱ Zeiterfassung</h1>
  <div class="uhr" id="uhr">00:00:00</div>
  <div class="datum" id="datum"></div>

  <div class="section-label">Mitarbeiter auswählen</div>
  <div class="mitarbeiter-grid" id="maGrid"></div>

  <div class="section-label">Aktion</div>
  <div class="aktionen">
    <button class="aktion-btn btn-ein" id="btnEin" onclick="aktion('Einstempeln')" disabled>
      <span class="icon">▶</span> Einstempeln
    </button>
    <button class="aktion-btn btn-pause" id="btnPause" onclick="aktion('Pause')" disabled>
      <span class="icon">⏸</span> <span id="pauseLabel">Pause Start</span>
    </button>
    <button class="aktion-btn btn-aus" id="btnAus" onclick="aktion('Ausstempeln')" disabled>
      <span class="icon">■</span> Ausstempeln
    </button>
  </div>

  <div class="status-bar">
    <div class="status-dot dot-grau" id="statusDot"></div>
    <span id="statusText">Bitte Mitarbeiter auswählen</span>
  </div>

  <hr class="divider">

  <div class="log-header">
    <div class="section-label" style="margin-bottom:0">Protokoll</div>
    <button class="log-clear" onclick="clearLog()">löschen</button>
  </div>
  <div class="log" id="log">
    <div class="log-entry info">— Bereit —</div>
  </div>

  <div class="config-hint" id="configHint">
    <strong>⚙ Konfiguration nötig:</strong> Trage die URL deines Apps Script Web App in
    <code>WEB_APP_URL</code> ein (Zeile 1 im Script-Block dieser Datei),
    und passe die Mitarbeiterliste in <code>MITARBEITER</code> an.
  </div>
</div>

<script>
// ─── KONFIGURATION ────────────────────────────────────────────────────────────
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzVXqsSMMwHcpse-0Ps3CCOC9EEdfrGj0JoU4uR3dVYhJ1gXIMhoq5HbJ77QFXJnOV4/exec";

const MITARBEITER = [
  "Anna M.",
  "Ben K.",
  "Clara S.",
  "David R.",
  "Eva L.",
  "Frank H.",
  "Gabi N.",
  "Hans P.",
  "Iris W."
  // weitere Mitarbeiter hier ergänzen
];
// ─────────────────────────────────────────────────────────────────────────────

// Status-Machine: idle | ein | pause | aus
let zustand = "idle";
let aktiverMA = null;
let inPause = false;

// ── Uhr ───────────────────────────────────────────────────────────────────────
function updateUhr() {
  const now = new Date();
  document.getElementById("uhr").textContent =
    now.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  document.getElementById("datum").textContent =
    now.toLocaleDateString("de-DE", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
}
setInterval(updateUhr, 1000);
updateUhr();

// ── Mitarbeiter-Buttons generieren ────────────────────────────────────────────
function renderMA() {
  const grid = document.getElementById("maGrid");
  grid.innerHTML = "";
  MITARBEITER.forEach(name => {
    const btn = document.createElement("button");
    btn.className = "ma-btn";
    btn.textContent = name;
    btn.onclick = () => waehlMA(name, btn);
    grid.appendChild(btn);
  });
}

function waehlMA(name, btn) {
  if (zustand === "ein" || zustand === "pause") {
    log(`⚠ ${aktiverMA} ist noch eingestempelt.`, "error");
    return;
  }
  document.querySelectorAll(".ma-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  aktiverMA = name;
  zustand = "idle";
  inPause = false;
  aktualisiereUI();
  log(`Mitarbeiter gewählt: ${name}`, "info");
}

// ── State Machine ─────────────────────────────────────────────────────────────
function aktualisiereUI() {
  const btnEin   = document.getElementById("btnEin");
  const btnPause = document.getElementById("btnPause");
  const btnAus   = document.getElementById("btnAus");
  const dot      = document.getElementById("statusDot");
  const statusTxt = document.getElementById("statusText");
  const pauseLabel = document.getElementById("pauseLabel");

  if (!aktiverMA) {
    btnEin.disabled = btnPause.disabled = btnAus.disabled = true;
    dot.className = "status-dot dot-grau";
    statusTxt.textContent = "Bitte Mitarbeiter auswählen";
    return;
  }

  if (zustand === "idle") {
    btnEin.disabled = false;
    btnPause.disabled = true;
    btnAus.disabled = true;
    dot.className = "status-dot dot-grau";
    statusTxt.textContent = `${aktiverMA} – bereit zum Einstempeln`;
  } else if (zustand === "ein") {
    btnEin.disabled = true;
    btnPause.disabled = false;
    btnAus.disabled = false;
    pauseLabel.textContent = "Pause Start";
    dot.className = "status-dot dot-gruen";
    statusTxt.textContent = `${aktiverMA} – eingestempelt seit ${zeitJetzt()}`;
  } else if (zustand === "pause") {
    btnEin.disabled = true;
    btnPause.disabled = false;
    btnAus.disabled = true;
    pauseLabel.textContent = "Pause Ende";
    dot.className = "status-dot dot-gelb";
    statusTxt.textContent = `${aktiverMA} – Pause seit ${zeitJetzt()}`;
  }
}

async function aktion(typ) {
  if (!aktiverMA) return;

  let aktionName = typ;

  if (typ === "Pause") {
    aktionName = inPause ? "Pause Ende" : "Pause Start";
    inPause = !inPause;
  }

  // State aktualisieren
  if (typ === "Einstempeln")  zustand = "ein";
  if (typ === "Pause" && inPause)   zustand = "pause";
  if (typ === "Pause" && !inPause)  zustand = "ein";
  if (typ === "Ausstempeln") { zustand = "idle"; }

  aktualisiereUI();

  const eintrag = {
    name: aktiverMA,
    aktion: aktionName,
    datum: new Date().toLocaleDateString("de-DE"),
    uhrzeit: new Date().toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit", second: "2-digit" }),
    timestamp: new Date().toISOString()
  };

  log(`→ ${aktionName} für ${aktiverMA} um ${eintrag.uhrzeit}`, "info");

  if (typ === "Ausstempeln") {
    resetMA();
  }

  await sendeZuSheets(eintrag);
}

function resetMA() {
  aktiverMA = null;
  inPause = false;
  document.querySelectorAll(".ma-btn").forEach(b => b.classList.remove("selected"));
  setTimeout(aktualisiereUI, 100);
}

// ── Google Sheets senden ──────────────────────────────────────────────────────
async function sendeZuSheets(daten) {
  if (WEB_APP_URL === "DEINE_APPS_SCRIPT_WEB_APP_URL_HIER") {
    log("⚠ Web App URL nicht konfiguriert – Daten nur lokal angezeigt.", "error");
    log(`   Wäre gespeichert: ${daten.name} | ${daten.aktion} | ${daten.uhrzeit}`, "info");
    return;
  }

  try {
    log("Sende an Google Sheets...", "info");
    const resp = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(daten),
      mode: "no-cors"
    });
    log(`✓ Gespeichert in Google Sheets`, "success");
  } catch (err) {
    log(`✗ Fehler: ${err.message}`, "error");
  }
}

// ── Hilfsfunktionen ───────────────────────────────────────────────────────────
function zeitJetzt() {
  return new Date().toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
}

function log(msg, typ = "info") {
  const logDiv = document.getElementById("log");
  const entry = document.createElement("div");
  entry.className = `log-entry ${typ}`;
  entry.textContent = `[${zeitJetzt()}] ${msg}`;
  logDiv.appendChild(entry);
  logDiv.scrollTop = logDiv.scrollHeight;
}

function clearLog() {
  document.getElementById("log").innerHTML = '<div class="log-entry info">— Protokoll geleert —</div>';
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderMA();
aktualisiereUI();

if (WEB_APP_URL !== "DEINE_APPS_SCRIPT_WEB_APP_URL_HIER") {
  document.getElementById("configHint").style.display = "none";
}
</script>
</body>
</html>
