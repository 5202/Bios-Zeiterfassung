  --clr-idle-bg:     #FEE2E2;
  --clr-idle-border: #FECACA;
  --clr-ein-bg:      #DCFCE7;
  --clr-ein-border:  #BBF7D0;
  --clr-pause-bg:    #FEF9C3;
  --clr-pause-border:#FDE68A;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #F1F5F9;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* ── Header ──────────────────────────────────────────────────── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--gruen-dark);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  padding-top: env(safe-area-inset-top);
  z-index: 10;
  gap: 12px;
}

#logoWrap {
  display: flex;
  align-items: center;
  gap: 12px;
}

#logoImg {
  width: 36px;
  height: 36px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: 0.92;
}

#appTitle {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

#headerRight { text-align: right; }

#uhr {
  font-size: 24px;
  font-weight: 300;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}

#datum {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  margin-top: 1px;
}

/* ── Grid ────────────────────────────────────────────────────── */
#main {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
}

#maGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}

/* ── Karte ───────────────────────────────────────────────────── */
.ma-card {
  background: var(--clr-idle-bg);
  border: 2px solid var(--clr-idle-border);
  border-radius: 18px;
  padding: 20px 10px 16px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  user-select: none;
  min-height: 130px;
  transition: transform 0.12s, box-shadow 0.12s;
}

.ma-card:active { transform: scale(0.95); }

.ma-card.state-ein   { background: var(--clr-ein-bg);   border-color: var(--clr-ein-border); }
.ma-card.state-pause { background: var(--clr-pause-bg); border-color: var(--clr-pause-border); }

.status-icon { width: 44px; height: 44px; flex-shrink: 0; }

.ma-name {
  font-size: 14px;
  font-weight: 600;
  color: #1E293B;
  text-align: center;
  line-height: 1.3;
  word-break: break-word;
}

.status-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: #EF4444;
}

.ma-card.state-ein   .status-label { color: #16A34A; }
.ma-card.state-pause .status-label { color: #D97706; }

/* ── Zentriertes Modal ───────────────────────────────────────── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

#overlay.open { display: flex; }

#modal {
  background: #fff;
  border-radius: 24px;
  width: 100%;
  max-width: 380px;
  padding: 32px 24px 28px;
  animation: popIn 0.2s ease-out;
}

@keyframes popIn {
  from { transform: scale(0.92); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

#modalLogo {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
}

#modalLogoImg {
  width: 48px;
  height: 48px;
  object-fit: contain;
}

#modalName {
  font-size: 24px;
  font-weight: 700;
  color: #0F172A;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}

#modalStatus {
  font-size: 13px;
  text-align: center;
  color: #64748B;
  margin-bottom: 28px;
}

#modalBtns {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.modal-btn {
  padding: 18px;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: transform 0.1s, filter 0.1s;
  letter-spacing: -0.2px;
}

.modal-btn:active { transform: scale(0.97); filter: brightness(0.92); }

.btn-ein   { background: #22C55E; color: #fff; }
.btn-pause { background: #F59E0B; color: #fff; }
.btn-aus   { background: #EF4444; color: #fff; }
.btn-cancel {
  background: #F1F5F9;
  color: #64748B;
  font-size: 15px;
  font-weight: 500;
  margin-top: 2px;
  padding: 14px;
}

/* ── Lade-Overlay ────────────────────────────────────────────── */
#ladeOverlay {
  position: fixed; inset: 0;
  background: #F1F5F9;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 200;
}
#ladeOverlay.hidden { display: none; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #E2E8F0;
  border-top-color: var(--gruen);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#ladeText { font-size: 15px; color: #64748B; }

/* ── Toast ───────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--gruen-dark);
  color: #fff;
  padding: 12px 22px;
  border-radius: 100px;
  font-size: 14px; font-weight: 500;
  z-index: 300;
  transition: transform 0.3s ease, opacity 0.3s ease;
  opacity: 0; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── Fehler ──────────────────────────────────────────────────── */
#fehlerBanner {
  display: none;
  position: fixed; top: var(--header-h); left: 0; right: 0;
  background: #FEF2F2; border-bottom: 1px solid #FECACA;
  color: #991B1B; font-size: 13px;
  padding: 10px 16px; text-align: center; z-index: 9;
}
</style>
</head>
<body>

<div id="ladeOverlay">
  <div class="spinner"></div>
  <div id="ladeText">Mitarbeiter werden geladen…</div>
</div>

<div id="fehlerBanner"></div>

<div id="header">
  <div id="logoWrap">
    <img id="logoImg" src="" alt="BIOS Logo">
    <div id="appTitle">Zeiterfassung</div>
  </div>
  <div id="headerRight">
    <div id="uhr">00:00:00</div>
    <div id="datum"></div>
  </div>
</div>

<div id="main">
  <div id="maGrid"></div>
</div>

<div id="overlay" onclick="overlayKlick(event)">
  <div id="modal">
    <div id="modalLogo"><img id="modalLogoImg" src="" alt="" width="48" height="48"></div>
    <div id="modalName"></div>
    <div id="modalStatus"></div>
    <div id="modalBtns"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  KONFIGURATION  ← hier anpassen
// ═══════════════════════════════════════════════════════════════
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwicZCZv7VEStfJa2bXbA6_fVOn0BGh85T2QWeHYZRLN0uSWN0un1YgPyzATNCLuUlA/exec";
// ═══════════════════════════════════════════════════════════════

const STATE_KEY = "ze_status_v1";
let status = {};
let aktiverMA = null;

function ladeStatus() {
  try { status = JSON.parse(localStorage.getItem(STATE_KEY)) || {}; }
  catch { status = {}; }
}
function speichereStatus() {
  localStorage.setItem(STATE_KEY, JSON.stringify(status));
}
function getZustand(name) { return status[name] || "idle"; }
function setZustand(name, z) { status[name] = z; speichereStatus(); }

// ── Uhr ───────────────────────────────────────────────────────
function updateUhr() {
  const n = new Date();
  document.getElementById("uhr").textContent =
    n.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  document.getElementById("datum").textContent =
    n.toLocaleDateString("de-DE", { weekday: "short", day: "numeric", month: "long", year: "numeric" });
}
setInterval(updateUhr, 1000); updateUhr();

// ── Icons ─────────────────────────────────────────────────────
function svgIdle() {
  return `<svg class="status-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="19" stroke="#EF4444" stroke-width="3"/>
    <line x1="9" y1="9" x2="35" y2="35" stroke="#EF4444" stroke-width="3" stroke-linecap="round"/>
  </svg>`;
}
function svgEin() {
  return `<svg class="status-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="19" fill="#22C55E" stroke="#16A34A" stroke-width="2"/>
    <polyline points="12,22 18,29 32,14" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}
function svgPause() {
  return `<svg class="status-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="19" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
    <rect x="14" y="13" width="5" height="18" rx="2" fill="#fff"/>
    <rect x="25" y="13" width="5" height="18" rx="2" fill="#fff"/>
  </svg>`;
}
function getIcon(z) {
  if (z === "ein")   return svgEin();
  if (z === "pause") return svgPause();
  return svgIdle();
}
function getLabel(z) {
  if (z === "ein")   return "Eingestempelt";
  if (z === "pause") return "Pause";
  return "Nicht da";
}

// ── Grid ──────────────────────────────────────────────────────
function renderGrid(namen) {
  const grid = document.getElementById("maGrid");
  grid.innerHTML = "";
  namen.forEach(name => {
    const z = getZustand(name);
    const card = document.createElement("div");
    card.className = `ma-card state-${z}`;
    card.dataset.name = name;
    card.innerHTML = `${getIcon(z)}<div class="ma-name">${name}</div><div class="status-label">${getLabel(z)}</div>`;
    card.onclick = () => oeffneModal(name);
    grid.appendChild(card);
  });
}

function updateKarte(name) {
  const card = document.querySelector(`.ma-card[data-name="${name}"]`);
  if (!card) return;
  const z = getZustand(name);
  card.className = `ma-card state-${z}`;
  card.innerHTML = `${getIcon(z)}<div class="ma-name">${name}</div><div class="status-label">${getLabel(z)}</div>`;
  card.onclick = () => oeffneModal(name);
}

// ── Modal ─────────────────────────────────────────────────────
function oeffneModal(name) {
  aktiverMA = name;
  const z = getZustand(name);
  document.getElementById("modalName").textContent = name;
  document.getElementById("modalStatus").textContent =
    z === "idle" ? "Nicht eingestempelt" : z === "ein" ? "Eingestempelt" : "In der Pause";

  const btns = document.getElementById("modalBtns");
  btns.innerHTML = "";

  if (z === "idle") {
    btns.appendChild(makeBtn("▶  Einstempeln", "btn-ein", () => aktion("Einstempeln", "ein")));
  } else if (z === "ein") {
    btns.appendChild(makeBtn("⏸  Pause Start", "btn-pause", () => aktion("Pause Start", "pause")));
    btns.appendChild(makeBtn("■  Ausstempeln", "btn-aus",   () => aktion("Ausstempeln", "idle")));
  } else if (z === "pause") {
    btns.appendChild(makeBtn("▶  Pause Ende",  "btn-pause", () => aktion("Pause Ende", "ein")));
  }
  btns.appendChild(makeBtn("Abbrechen", "btn-cancel", schliesseModal));
  document.getElementById("overlay").classList.add("open");
}

function makeBtn(label, cls, fn) {
  const b = document.createElement("button");
  b.className = `modal-btn ${cls}`;
  b.textContent = label;
  b.onclick = fn;
  return b;
}

function schliesseModal() {
  document.getElementById("overlay").classList.remove("open");
  aktiverMA = null;
}

function overlayKlick(e) {
  if (e.target === document.getElementById("overlay")) schliesseModal();
}

// ── Aktion ────────────────────────────────────────────────────
async function aktion(aktionName, neuerZustand) {
  const name = aktiverMA;
  schliesseModal();
  setZustand(name, neuerZustand);
  updateKarte(name);

  const jetzt = new Date();
  const eintrag = {
    name, aktion: aktionName,
    datum:     jetzt.toLocaleDateString("de-DE"),
    uhrzeit:   jetzt.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit", second: "2-digit" }),
    timestamp: jetzt.toISOString()
  };
  zeigeToast(`${aktionName}: ${name}`);
  await sendeZuSheets(eintrag);
}

// ── Sheets senden ─────────────────────────────────────────────
async function sendeZuSheets(daten) {
  if (!WEB_APP_URL.startsWith("https://script.google.com")) return;
  try {
    await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...daten, type: "stempel" }),
      mode: "no-cors"
    });
  } catch (err) { console.error("Sheets Fehler:", err); }
}

// ── Namen laden ───────────────────────────────────────────────
async function ladeNamen() {
  if (!WEB_APP_URL.startsWith("https://script.google.com")) {
    console.log("🟡 Demo-Modus: WEB_APP_URL nicht gesetzt.");
    return ["Anna M.", "Ben K.", "Clara S.", "David R.", "Eva L.",
            "Frank H.", "Gabi N.", "Hans P.", "Iris W.", "Jan F.",
            "Karin L.", "Lars M.", "Maria S.", "Nils R.", "Olga T.",
            "Paul W.", "Quin B."];
  }
  try {
    const url = `${WEB_APP_URL}?action=getNamen&t=${Date.now()}`;
    console.log("🔵 Lade Namen von:", url);
    const resp = await fetch(url);
    console.log("🔵 HTTP Status:", resp.status);
    const text = await resp.text();
    console.log("🔵 Rohantwort:", text.substring(0, 300));
    const data = JSON.parse(text);
    console.log("🟢 Namen geladen:", data.namen);
    return data.namen || [];
  } catch (err) {
    console.error("🔴 Fehler:", err);
    zeigeFehler("Verbindung fehlgeschlagen – Cache wird verwendet.");
    return JSON.parse(localStorage.getItem("ze_namen_cache") || "[]");
  }
}

// ── Toast / Fehler ────────────────────────────────────────────
let toastTimer;
function zeigeToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
}
function zeigeFehler(msg) {
  const b = document.getElementById("fehlerBanner");
  b.textContent = msg; b.style.display = "block";
  setTimeout(() => b.style.display = "none", 5000);
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  ladeStatus();
  const namen = await ladeNamen();
  if (namen.length > 0) localStorage.setItem("ze_namen_cache", JSON.stringify(namen));
  renderGrid(namen);
  document.getElementById("ladeOverlay").classList.add("hidden");
}

init();
